name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go control plane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod verify
      - run: go test -count=1 ./...
      - run: go vet ./...
      - uses: golang/govulncheck-action@v1
        with:
          cache: false
          go-package: ./...
          repo-checkout: false

  web:
    name: TypeScript console
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check:api
      - run: npm test
      - run: npm run build
      - name: Audit dependencies
        run: |
          for attempt in 1 2 3; do
            if npm audit --audit-level=high; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 5))
            fi
          done
          exit 1

  desktop:
    name: Windows Desktop shell
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build embedded renderer
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Test Desktop boundaries
        run: go test -tags "desktop,wv2runtime.error" -count=1 ./cmd/cyberagent-desktop ./internal/desktop ./internal/webui
      - name: Build and verify portable Desktop shell
        shell: pwsh
        run: ./scripts/build-desktop.ps1 -SkipFrontend -VerifyReproducible
